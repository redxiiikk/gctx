version: "3"

vars:
  BINARY: mgit
  CMD: ./cmd/mgit
  DIST: dist
  # Leave VERSION empty for local builds — the default in main.go is used.
  # CI should pass the git tag: task build VERSION=v1.2.3
  VERSION: ""
  BUILD_DATE:
    sh: date +%Y-%m-%d
  # Inject buildDate always; inject version only when VERSION is non-empty.
  LDFLAGS:
    sh: |
      flags="-X main.buildDate={{.BUILD_DATE}}"
      if [ -n "{{.VERSION}}" ]; then
        flags="$flags -X main.version={{.VERSION}}"
      fi
      echo "$flags"
  INSTALL_DIR:
    sh: go env GOPATH

tasks:
  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w -s .

  build:
    desc: Build the mgit binary into dist/
    cmds:
      - mkdir -p {{.DIST}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.DIST}}/{{.BINARY}} {{.CMD}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}"

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  install:
    desc: Install mgit to $GOPATH/bin (add $GOPATH/bin to PATH if not already there)
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.CMD}}
      - echo "Installed to {{.INSTALL_DIR}}/bin/{{.BINARY}}"
