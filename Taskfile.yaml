version: "3"

tasks:
  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w -s .

  build:
    desc: Build a snapshot for the current platform via goreleaser (output goes to dist/)
    cmds:
      - goreleaser build --snapshot --clean --single-target

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...
