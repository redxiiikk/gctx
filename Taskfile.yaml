version: "3"

vars:
  BINARY: mgit
  CMD: ./cmd/mgit
  DIST: dist
  VERSION: 1.0.0
  BUILD_DATE:
    sh: date +%Y-%m-%d
  INSTALL_DIR:
    sh: go env GOPATH

tasks:
  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w -s .

  build:
    desc: Build the mgit binary into dist/
    cmds:
      - mkdir -p {{.DIST}}
      - go build -ldflags "-X main.version={{.VERSION}} -X main.buildDate={{.BUILD_DATE}}" -o {{.DIST}}/{{.BINARY}} {{.CMD}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST}}/{{.BINARY}}"

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  install:
    desc: Install mgit to $GOPATH/bin (add $GOPATH/bin to PATH if not already there)
    cmds:
      - go install -ldflags "-X main.version={{.VERSION}} -X main.buildDate={{.BUILD_DATE}}" {{.CMD}}
      - echo "Installed to {{.INSTALL_DIR}}/bin/{{.BINARY}}"
